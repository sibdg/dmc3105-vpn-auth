# www.dmc3105.ru — VPN Auth behind host nginx
# Replace 18080 / 18000 with FRONTEND_HOST_PORT / BACKEND_HOST_PORT from VPS .env
#
# Важно:
# 1) Блок /vpn-auth/api/ ОБЯЗАТЕЛЬНО выше /vpn-auth/, и в proxy_pass должен быть суффикс /api/
#    иначе на бэкенд уйдёт /auth/... вместо /api/auth/... → 404.
# 2) Если location ниже только в server { listen 443 ssl; }, а по :80 заходите без редиректа,
#    запросы на http://.../vpn-auth/api/ получат 404 — добавьте редирект (первый server) или
#    продублируйте те же location в server на порту 80.

server {
    listen 80;
    listen [::]:80;
    server_name www.dmc3105.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dmc3105.ru;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location /vpn-auth/api/ {
        proxy_pass http://127.0.0.1:18000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /vpn-auth/ {
        proxy_pass http://127.0.0.1:18080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
