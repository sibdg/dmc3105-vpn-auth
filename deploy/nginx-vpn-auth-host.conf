# Host Nginx config for:
# - https://www.dmc3105.ru -> frontend container (127.0.0.1:8080)
# - https://api.dmc3105.ru -> backend container (127.0.0.1:8000)
#
# Usage on VPS:
# 1) Put this file to /etc/nginx/sites-available/vpn-auth
# 2) ln -s /etc/nginx/sites-available/vpn-auth /etc/nginx/sites-enabled/vpn-auth
# 3) nginx -t && systemctl reload nginx
# 4) Issue certs:
#    certbot --nginx -d www.dmc3105.ru -d api.dmc3105.ru

server {
    listen 80;
    listen [::]:80;
    server_name www.dmc3105.ru api.dmc3105.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.dmc3105.ru;

    # Certbot will manage these paths after issuing certificates
    ssl_certificate /etc/letsencrypt/live/www.dmc3105.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.dmc3105.ru/privkey.pem;

    # Basic TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.dmc3105.ru;

    # Certbot will manage these paths after issuing certificates
    ssl_certificate /etc/letsencrypt/live/api.dmc3105.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.dmc3105.ru/privkey.pem;

    # Basic TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
