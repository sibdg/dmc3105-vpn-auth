services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vpn-auth-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
      - ${HYSTERIA_CONFIG_HOST_PATH:-/etc/hysteria/config.yaml}:${HYSTERIA_CONFIG_CONTAINER_PATH:-/etc/hysteria/config.yaml}
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/vpn-auth/api}
        VITE_ROUTER_BASENAME: ${VITE_ROUTER_BASENAME:-/vpn-auth}
        VITE_CSRF_COOKIE_NAME: vpn_admin_csrf
        VITE_APP_NAME: ${VITE_APP_NAME:-VPN Auth Service}
        VITE_HYSTERIA_URI_TAG: ${VITE_HYSTERIA_URI_TAG:-VPN Auth}
    container_name: vpn-auth-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-18080}:80"

volumes:
  backend_data:
